<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0b1929">
<title>Santurtzi LHFP - Inventario</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
:root{
  --bg:#0b1929;--card:#122136;--border:rgba(94,198,184,0.12);--borderH:rgba(94,198,184,0.35);
  --teal:#5ec6b8;--tealD:#3b8d8d;--navy:#1a3a5f;--text:#e8f0f8;--muted:#7a9ab5;--dim:#4a6a85;
  --danger:#e05565;--ok:#4ecdc4;--warn:#f59e0b;
  --gbtn:linear-gradient(135deg,#3b8d8d,#5ec6b8);
  --font:'Plus Jakarta Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);font-family:var(--font);color:var(--text);min-height:100vh;overflow-x:hidden}
button{font-family:var(--font);cursor:pointer;border:none}
input,select,textarea{font-family:var(--font);outline:none}
input::placeholder,textarea::placeholder{color:var(--dim)}
input:focus,select:focus,textarea:focus{border-color:var(--teal)!important}
select option{background:var(--card);color:var(--text)}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:#1e3050;border-radius:3px}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translate(-50%,-20px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(94,198,184,0.2)}50%{box-shadow:0 0 40px rgba(94,198,184,0.5)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}

.fade-in{animation:fadeIn .4s ease}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#0b1929 0%,#122136 50%,#1a3a5f 100%)}
.login-card{width:100%;max-width:400px;background:var(--card);border-radius:28px;padding:40px 32px;border:1px solid var(--borderH);box-shadow:0 24px 80px rgba(0,0,0,.4)}
.login-card h2{text-align:center;font-size:24px;font-weight:900;margin-bottom:8px}
.login-card .subtitle{text-align:center;color:var(--muted);font-size:14px;margin-bottom:32px}
.login-banner{width:100%;max-width:400px;border-radius:20px 20px 0 0;overflow:hidden;margin-bottom:0}
.login-banner img{width:100%;display:block}

/* INPUTS */
.field{display:flex;flex-direction:column;gap:8px;margin-bottom:18px}
.field label{font-size:12px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px}
.field input,.field select,.field textarea{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;font-weight:500;width:100%;box-sizing:border-box}
.btn-primary{background:var(--gbtn);color:#fff;border-radius:14px;padding:16px;font-weight:800;font-size:16px;width:100%;transition:all .2s;box-shadow:0 8px 24px rgba(59,141,141,.3)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(59,141,141,.45)}
.btn-secondary{background:#1e3050;color:var(--muted);border-radius:14px;padding:14px;font-weight:700;font-size:15px;width:100%}
.btn-danger{background:var(--danger);color:#fff;border-radius:12px;padding:12px 20px;font-weight:700;font-size:14px}
.btn-warn{background:linear-gradient(135deg,var(--warn),#d97706);color:#fff;border-radius:12px;padding:12px 20px;font-weight:800;font-size:14px}
.btn-ok{background:var(--ok);color:#fff;border-radius:12px;padding:10px 18px;font-weight:700;font-size:13px}

/* HEADER */
header{background:#fff}
header img{width:100%;display:block}
.header-sub{background:#fff;padding:10px 28px;border-bottom:1px solid #e0e8f0;text-align:center}
.header-sub p{margin:0;font-size:12px;font-weight:500;color:#6b8299;letter-spacing:2px;text-transform:uppercase;white-space:nowrap}

/* NAV */
nav{background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;display:flex}
nav .nav-inner{display:flex;gap:0;max-width:960;margin:0 auto;width:100%}
nav button{background:none;color:var(--dim);padding:14px 16px;font-size:13px;font-weight:700;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
nav button.active{color:var(--teal);border-bottom-color:var(--teal)}

/* USER BAR */
.user-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 28px;display:flex;justify-content:space-between;align-items:center;max-width:100%}
.user-info{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
.user-info .role-badge{padding:3px 12px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}
.role-admin{background:rgba(224,85,101,.15);color:var(--danger)}
.role-editor{background:rgba(94,198,184,.15);color:var(--teal)}
.role-operario{background:rgba(245,158,11,.15);color:var(--warn)}
.role-visor{background:rgba(100,181,246,.15);color:#64b5f6}
.btn-logout{background:rgba(224,85,101,.1);color:var(--danger);border-radius:10px;padding:8px 16px;font-size:12px;font-weight:700}

/* MAIN */
main{max-width:960px;margin:0 auto;padding:24px}

/* CARDS / STATS */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:14px;margin-bottom:24px}
.stat-card{background:var(--card);border-radius:20px;padding:22px;border:1px solid var(--border);position:relative;overflow:hidden}
.stat-card .icon{position:absolute;top:-8px;right:-8px;font-size:44px;opacity:.06}
.stat-card .label{color:var(--muted);font-size:11px;font-weight:700;margin-bottom:10px;text-transform:uppercase;letter-spacing:1px}
.stat-card .value{font-size:34px;font-weight:900;font-family:var(--mono);line-height:1}

.card{background:var(--card);border-radius:18px;padding:20px;border:1px solid var(--border);margin-bottom:14px}

/* NOTIFICATION */
.notif{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;padding:14px 32px;border-radius:14px;font-weight:700;font-size:15px;box-shadow:0 12px 40px rgba(0,0,0,.4);animation:slideDown .3s ease;color:#fff}
.notif.success{background:var(--ok)}.notif.error{background:var(--danger)}

/* ITEMS */
.item-row{background:var(--card);border-radius:16px;padding:16px;border:1px solid var(--border);display:flex;align-items:center;gap:14px;margin-bottom:10px}
.item-row:hover{border-color:var(--borderH)}

/* QR */
.qr-canvas{background:#fff;border-radius:10px;padding:5px;cursor:pointer;flex-shrink:0}
#qr-reader{width:100%;max-width:400px;margin:0 auto}
#qr-reader video{border-radius:16px!important}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(10,20,35,.95);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(8px)}
.modal{background:var(--card);border-radius:24px;padding:32px;max-width:480px;width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--borderH);box-shadow:0 24px 80px rgba(0,0,0,.5)}

/* CHIP FILTERS */
.chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:18px}
.chip{border:1px solid var(--border);border-radius:24px;padding:8px 18px;font-size:13px;font-weight:600;white-space:nowrap;background:var(--card);color:var(--muted);transition:all .2s}
.chip.active{background:var(--teal);color:#fff;border-color:var(--teal)}

/* SEARCH */
.search-box{background:var(--bg);border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--text);font-size:15px;width:100%;box-sizing:border-box;margin-bottom:18px}

/* EMPTY */
.empty{background:var(--card);border-radius:22px;padding:56px 24px;text-align:center;border:1px solid var(--border)}
.empty .emoji{font-size:52px;margin-bottom:18px;opacity:.6}
.empty p{color:var(--dim);font-size:15px;font-weight:600}

/* STATUS DOT */
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.dot.ok{background:var(--ok);box-shadow:0 0 10px rgba(78,205,196,.4)}
.dot.danger{background:var(--danger);box-shadow:0 0 10px rgba(224,85,101,.4)}

/* SYNC STATUS */
.sync-status{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:600}
.sync-dot{width:8px;height:8px;border-radius:50%;animation:pulse 1.5s infinite}
.sync-dot.online{background:var(--ok)}.sync-dot.offline{background:var(--warn)}

/* CONFIG */
.config-section{background:var(--card);border-radius:20px;padding:28px;border:1px solid var(--border);margin-bottom:20px}
.config-section h3{font-size:17px;font-weight:800;margin-bottom:16px;display:flex;align-items:center;gap:10px}

/* RESPONSIVE */
@media(max-width:600px){
  main{padding:16px}
  .stats-grid{grid-template-columns:repeat(2,1fr)}
  nav button{padding:12px 12px;font-size:12px}
  .login-card{padding:28px 20px}
}

/* PRINT QR */
@media print{
  body *{visibility:hidden}
  .print-area,.print-area *{visibility:visible}
  .print-area{position:absolute;left:0;top:0;width:100%}
}

/* INC TYPE BUTTONS */
.tipo-btn{flex:1;border-radius:12px;padding:12px 8px;text-align:center;font-size:13px;font-weight:700;transition:all .2s;border:2px solid var(--border);background:var(--bg);color:var(--muted)}
.tipo-btn.active-danger{border-color:var(--danger);background:rgba(224,85,101,.08);color:var(--danger)}
.tipo-btn.active-warn{border-color:var(--warn);background:rgba(245,158,11,.08);color:var(--warn)}
.tipo-btn.active-info{border-color:#64b5f6;background:rgba(100,181,246,.08);color:#64b5f6}

/* USERS TABLE */
.user-row{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px}
.user-row .avatar{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;color:#fff;flex-shrink:0}

/* DROPDOWN SEARCH */
.dropdown-list{background:var(--bg);border:1px solid var(--borderH);border-radius:14px;max-height:220px;overflow-y:auto}
.dropdown-item{width:100%;background:transparent;border:none;border-bottom:1px solid var(--border);padding:12px 14px;display:flex;align-items:center;gap:12px;text-align:left;font-family:inherit;color:var(--text);transition:background .15s}
.dropdown-item:hover{background:var(--card)}

footer{text-align:center;padding:28px;color:var(--dim);font-size:12px;font-weight:600;border-top:1px solid var(--border)}
</style>
</head>

// ── QR GENERATOR ──
function generateQRMatrix(text){
  const s=25,m=Array(s).fill(null).map(()=>Array(s).fill(false));
  const af=(ox,oy)=>{for(let y=0;y<7;y++)for(let x=0;x<7;x++)m[oy+y][ox+x]=x===0||x===6||y===0||y===6||(x>=2&&x<=4&&y>=2&&y<=4)};
  af(0,0);af(18,0);af(0,18);
  for(let i=8;i<17;i++){m[6][i]=i%2===0;m[i][6]=i%2===0}
  let h=0;for(let i=0;i<text.length;i++)h=((h<<5)-h+text.charCodeAt(i))|0;
  let seed=Math.abs(h);const nx=()=>{seed=(seed*1103515245+12345)&0x7fffffff;return seed};
  for(let y=0;y<s;y++)for(let x=0;x<s;x++){if(m[y][x])continue;if((x<8&&y<8)||(x>16&&y<8)||(x<8&&y>16))continue;if(x===6||y===6)continue;m[y][x]=nx()%3!==0}
  return m;
}
function drawQR(canvas,value,size,color){
  const ctx=canvas.getContext('2d'),mt=generateQRMatrix(value),cs=size/mt.length;
  canvas.width=size;canvas.height=size;ctx.fillStyle='#fff';ctx.fillRect(0,0,size,size);ctx.fillStyle=color||'#1a3a5f';
  mt.forEach((row,y)=>row.forEach((cell,x)=>{if(cell){const r=cs*.12,cx=x*cs,cy=y*cs,w=cs+.5,h=cs+.5;ctx.beginPath();ctx.moveTo(cx+r,cy);ctx.arcTo(cx+w,cy,cx+w,cy+h,r);ctx.arcTo(cx+w,cy+h,cx,cy+h,r);ctx.arcTo(cx,cy+h,cx,cy,r);ctx.arcTo(cx,cy,cx+w,cy,r);ctx.fill()}}));
}

function save(){

function load(){
  let d=null;
  try{d=localStorage.getItem('santurtzi_state');}catch(e){console.warn('localStorage no disponible:',e);}
  if(d){
    const s=JSON.parse(d);
    APP.productos=s.productos&&s.productos.length?s.productos:JSON.parse(JSON.stringify(DEFAULT_INV));
    APP.historial=s.historial||[];
    APP.incidencias=s.incidencias||[];
    APP.usuarios=s.usuarios&&s.usuarios.length?s.usuarios:JSON.parse(JSON.stringify(DEFAULT_USERS));
  } else {
    APP.productos=JSON.parse(JSON.stringify(DEFAULT_INV));
    APP.historial=[];APP.incidencias=[];
    APP.usuarios=JSON.parse(JSON.stringify(DEFAULT_USERS));
  }
  APP.sheetsUrl=SHEETS_URL;
  let sess=null;try{sess=sessionStorage.getItem('santurtzi_user');}catch(e){}
  if(sess){APP.currentUser=JSON.parse(sess);APP.screen='app'}
}

// ── GOOGLE SHEETS SYNC ──
async function syncFromSheets(){
  if(!APP.sheetsUrl)return;
  APP.syncing=true;render();
  try{
    // Usar GET con parámetro action - más fiable con Apps Script
    const r=await fetch(APP.sheetsUrl+'?action=getAll',{redirect:'follow'});
    const txt=await r.text();
    let d;
    try{d=JSON.parse(txt)}catch(pe){console.error('Parse error:',txt.substring(0,200));throw new Error('Respuesta no válida del servidor')}
    if(d.success){
      if(d.herramientas&&d.herramientas.length){
        APP.productos=d.herramientas;
      }
      if(d.historial){APP.historial=d.historial}
      if(d.incidencias){APP.incidencias=d.incidencias}
      if(d.usuarios&&d.usuarios.length){APP.usuarios=d.usuarios}
      APP.connected=true;save();notify('✅ Sincronizado con Google Sheets');
    } else {
      console.warn('Sheets response:',d);
      APP.connected=false;notify('⚠️ Error: '+(d.error||'sin datos'),'error');
    }
  }catch(e){
    console.error('Sync error:',e);
    APP.connected=false;notify('⚠️ Sin conexión - modo offline','error');
  }
  APP.syncing=false;render();
}
async function pushToSheets(action,data){
  if(!APP.sheetsUrl)return;
  try{
    // Usar GET con parámetros JSON codificados - evita problemas CORS con Apps Script
    const payload=encodeURIComponent(JSON.stringify({action,...data}));
    const url=APP.sheetsUrl+'?action='+action+'&data='+payload;
    // no-cors: el navegador envía la petición pero no lee la respuesta (evita CORS error)
    await fetch(url,{method:'GET',mode:'no-cors',redirect:'follow'});
    console.log('Push enviado (no-cors):',action);
  }catch(e){console.warn('Push failed ('+action+'):',e)}
}

let html5QrCode=null;

  APP.scanCallback=callback;APP.scannerActive=true;render();
  setTimeout(()=>{
    html5QrCode=new Html5Qrcode("qr-reader");
    html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:250},
      (text)=>{stopScanner();callback(text)},
      ()=>{}
    ).catch(()=>{notify('No se pudo acceder a la cámara','error')});
  },100);
}
function stopScanner(){
  if(html5QrCode){try{html5QrCode.stop()}catch(e){}}

function login(user,pass){
  const u=APP.usuarios.find(u=>u.usuario===user&&u.password===pass);
  if(u){APP.currentUser={...u};APP.screen='app';APP.tab='home';
    try{sessionStorage.setItem('santurtzi_user',JSON.stringify(u));}catch(e){}
    if(APP.sheetsUrl)syncFromSheets();render();
  } else notify('Usuario o contraseña incorrectos','error');
}
function logout(){APP.currentUser=null;APP.screen='login';try{sessionStorage.removeItem('santurtzi_user');}catch(e){}render()}

function prestar(pid){
  if(!APP.aN.trim()){notify('Introduce el nombre del alumno','error');return}
  const prod=APP.productos.find(p=>p.id===pid);
  const fecha=new Date().toLocaleString();
  prod.prestado={alumno:APP.aN,curso:APP.aC,fecha};prod.devuelto=false;
  const entry={tipo:'prestamo',productoId:pid,productoNombre:prod.nombre,alumno:APP.aN,curso:APP.aC,fecha,usuario:APP.currentUser.nombre};
  APP.historial.unshift(entry);
  save();
  pushToSheets('updateTool',{tool:{id:pid,nombre:prod.nombre,ubicacion:prod.ubicacion,categoria:prod.categoria,cantidad:prod.cantidad,prestado:true,alumno:APP.aN,curso:APP.aC,fecha}});
  pushToSheets('addHistorial',{entry:{tipo:'prestamo',productoId:pid,productoNombre:prod.nombre,alumno:APP.aN,curso:APP.aC,fecha}});
  notify('Herramienta prestada a '+APP.aN);APP.aN='';APP.aC='';APP.selProd=null;APP.scanMode=null;render();
}
function devolver(pid){
  const prod=APP.productos.find(p=>p.id===pid);
  const fecha=new Date().toLocaleString();
  const alumno=prod.prestado?.alumno||'?';
  const entry={tipo:'devolucion',productoId:pid,productoNombre:prod.nombre,alumno,fecha,usuario:APP.currentUser.nombre};
  APP.historial.unshift(entry);
  prod.prestado=null;prod.devuelto=true;
  save();
  pushToSheets('updateTool',{tool:{id:pid,nombre:prod.nombre,ubicacion:prod.ubicacion,categoria:prod.categoria,cantidad:prod.cantidad,prestado:false,alumno:'',curso:'',fecha:''}});
  pushToSheets('addHistorial',{entry:{tipo:'devolucion',productoId:pid,productoNombre:prod.nombre,alumno,curso:'',fecha}});
  notify('Herramienta devuelta');APP.selProd=null;APP.scanMode=null;render();
}
function addProducto(){
  if(!APP.nP.nombre.trim()){notify('Introduce un nombre','error');return}
  const id='HER-'+String(APP.productos.length+1).padStart(3,'0');
  APP.productos.push({...APP.nP,id,prestado:null,devuelto:true});
  save();
  pushToSheets('addTool',{tool:{id,nombre:APP.nP.nombre,ubicacion:APP.nP.ubicacion,categoria:APP.nP.categoria,cantidad:APP.nP.cantidad}});
  APP.nP={nombre:'',categoria:'extractores',cantidad:1,ubicacion:''};APP.showAdd=false;
  notify('Herramienta añadida');render();
}
function addIncidencia(){
  if(!APP.incProd){notify('Selecciona herramienta','error');return}
  if(!APP.incDesc.trim()){notify('Describe la incidencia','error');return}
  const prod=APP.productos.find(p=>p.id===APP.incProd);
  const inc={id:'INC-'+String(APP.incidencias.length+1).padStart(3,'0'),productoId:APP.incProd,productoNombre:prod?.nombre||'',
    tipo:APP.incTipo,descripcion:APP.incDesc,alumno:APP.incAlumno,fecha:new Date().toLocaleString(),resuelta:false,usuario:APP.currentUser.nombre};
  APP.incidencias.unshift(inc);
  save();
  pushToSheets('addIncidencia',{incidencia:inc});
  APP.incProd='';APP.incTipo='dañada';APP.incDesc='';APP.incAlumno='';APP.showAddInc=false;
  notify('Incidencia registrada');render();
}
function resolverInc(id){
  const inc=APP.incidencias.find(i=>i.id===id);
  if(inc){inc.resuelta=true;inc.fechaResolucion=new Date().toLocaleString();
    save();pushToSheets('updateIncidencia',{incidencia:{id:inc.id,resuelta:true,fechaResolucion:inc.fechaResolucion}});
    notify('Incidencia resuelta');render()}
}
function deleteUser(usuario){
  APP.usuarios=APP.usuarios.filter(u=>u.usuario!==usuario);save();render();notify('Usuario eliminado');
}
function saveUser(){
  const u=APP.newUser;
  if(!u.usuario.trim()||!u.password.trim()){notify('Completa usuario y contraseña','error');return}
  if(APP.editUser){
    const idx=APP.usuarios.findIndex(x=>x.usuario===APP.editUser);
    if(idx>=0)APP.usuarios[idx]={...u};
  } else {
    if(APP.usuarios.find(x=>x.usuario===u.usuario)){notify('El usuario ya existe','error');return}
    APP.usuarios.push({...u});
  }
  APP.editUser=null;APP.newUser={usuario:'',password:'',rol:'operario',nombre:''};APP.modal=null;
  save();render();notify('Usuario guardado');
}
function onScan(code){
  const prod=APP.productos.find(p=>p.id===code);
  if(!prod){notify('Código "'+code+'" no encontrado','error');return}
  if(APP.scanMode==='incidencia'){APP.incProd=prod.id;APP.incBusq='';APP.incSearchOpen=false;notify('Seleccionada: '+prod.nombre);render();return}
  APP.selProd=prod;
  if(APP.scanMode==='devolver'&&!prod.devuelto)devolver(prod.id);
  else render();
}

// RENDER ENGINE
// ═══════════════════════════════════════════
function h(tag,attrs,...children){
  const el=document.createElement(tag);
  if(attrs)Object.entries(attrs).forEach(([k,v])=>{
    if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
    else if(k.startsWith('on'))el[k.toLowerCase()]=v;
    else if(k==='className')el.className=v;
    else if(k==='innerHTML')el.innerHTML=v;
    else el.setAttribute(k,v);
  });
  children.flat(9).forEach(c=>{if(c!=null&&c!==false)el.append(typeof c==='string'||typeof c==='number'?document.createTextNode(c):c)});
  return el;
}

function render(){
  const app=document.getElementById('app');
  app.innerHTML='';
  // Notification
  if(APP.notif)app.append(h('div',{className:'notif '+(APP.notif.type||'success')},APP.notif.msg));
  // Scanner overlay
  if(APP.scannerActive)app.append(renderScanner());
  // QR Modal
  if(APP.modal==='qr')app.append(renderQRModal());
  if(APP.modal==='user')app.append(renderUserModal());

  if(APP.screen==='login')app.append(renderLogin());
  else app.append(renderApp());
}

function renderIncidencias(){
  const main=h('div',{className:'fade-in'},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'20px'}},
      h('h2',{style:{fontSize:'22px',fontWeight:900}},'Incidencias'),
      can('incident')?h('button',{className:'btn-warn',onClick:()=>{APP.showAddInc=!APP.showAddInc;render()}},'+Nueva'):null
    )
  );
  // Add form
  if(APP.showAddInc&&can('incident')){
    const form=h('div',{className:'card',style:{borderColor:'rgba(245,158,11,.3)',marginBottom:'20px'}},
      h('h3',{style:{fontSize:'17px',fontWeight:800,marginBottom:'16px'}},'Registrar Incidencia')
    );
    // Tool selector with search + QR
    const toolSel=h('div',{className:'field'},h('label',null,'Herramienta'));
    if(APP.incProd){
      const prod=APP.productos.find(p=>p.id===APP.incProd);
      const cv=document.createElement('canvas');cv.style.borderRadius='6px';
      setTimeout(()=>drawQR(cv,APP.incProd,38),0);
      toolSel.append(h('div',{style:{background:'var(--bg)',border:'2px solid var(--teal)',borderRadius:'14px',padding:'12px',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          h('div',{style:{background:'#fff',borderRadius:'6px',padding:'3px'}},cv),
          h('div',null,h('p',{style:{fontWeight:700,fontSize:'13px',margin:0}},prod?.nombre),
            h('p',{style:{color:'var(--teal)',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:700,margin:'2px 0 0'}},APP.incProd))),
        h('button',{className:'btn-danger',style:{padding:'6px 12px',fontSize:'11px'},onClick:()=>{APP.incProd='';render()}},'✕')
      ));
    } else {
      const searchRow=h('div',{style:{display:'flex',gap:'8px',marginBottom:'8px'}},
        h('input',{style:{flex:1,background:'var(--bg)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 14px',color:'var(--text)',fontSize:'14px'},
          value:APP.incBusq,placeholder:'🔍 Buscar por nombre o código...',
          onInput:e=>{APP.incBusq=e.target.value;APP.incSearchOpen=true;render()},
          onFocus:()=>{APP.incSearchOpen=true;render()}}),
        h('button',{style:{background:'var(--gbtn)',color:'#fff',borderRadius:'12px',padding:'12px 16px',fontSize:'18px'},
          onClick:()=>{APP.scanMode='incidencia';startScanner(onScan)}},'📷')
      );
      toolSel.append(searchRow);
      if(APP.incSearchOpen){
        const list=h('div',{className:'dropdown-list'});
        const results=APP.productos.filter(p=>{if(!APP.incBusq.trim())return true;const q=APP.incBusq.toLowerCase();
          return p.nombre.toLowerCase().includes(q)||p.id.toLowerCase().includes(q)||p.ubicacion.toLowerCase().includes(q)});
        results.forEach(p=>{
          const cv2=document.createElement('canvas');cv2.style.borderRadius='4px';
          setTimeout(()=>drawQR(cv2,p.id,30),0);
          list.append(h('button',{className:'dropdown-item',onClick:()=>{APP.incProd=p.id;APP.incBusq='';APP.incSearchOpen=false;render()}},
            h('div',{style:{background:'#fff',borderRadius:'5px',padding:'2px'}},cv2),
            h('div',{style:{flex:1}},h('p',{style:{fontWeight:600,fontSize:'13px',margin:0}},p.nombre),
              h('p',{style:{color:'var(--teal)',fontSize:'10px',fontFamily:'var(--mono)',fontWeight:700,margin:'2px 0 0'}},p.id+' · 📍 '+p.ubicacion)),
            !p.devuelto?h('span',{style:{fontSize:'9px',color:'var(--danger)',fontWeight:700,background:'rgba(224,85,101,.12)',padding:'2px 8px',borderRadius:'10px'}},'Prestada'):null
          ));
        });
        if(results.length===0)list.append(h('p',{style:{padding:'16px',textAlign:'center',color:'var(--dim)',fontSize:'13px'}},'Sin resultados'));
        toolSel.append(list);
      }
    }
    form.append(toolSel);
    // Tipo
    form.append(h('div',{className:'field'},h('label',null,'Tipo de incidencia'),
      h('div',{style:{display:'flex',gap:'10px'}},
        ...[{v:'dañada',l:'🔨 Dañada',cls:'danger'},{v:'incompleta',l:'📦 Incompleta',cls:'warn'},{v:'desgastada',l:'⏳ Desgastada',cls:'info'}].map(t=>
          h('button',{className:'tipo-btn'+(APP.incTipo===t.v?' active-'+t.cls:''),onClick:()=>{APP.incTipo=t.v;render()}},t.l))
      )
    ));
    form.append(h('div',{className:'field'},h('label',null,'Descripción del problema'),
      h('textarea',{rows:'3',value:APP.incDesc,placeholder:'Describe qué está dañado o qué falta...',onInput:e=>{APP.incDesc=e.target.value}})));
    form.append(h('div',{className:'field'},h('label',null,'Reportado por (opcional)'),
      h('input',{value:APP.incAlumno,placeholder:'Nombre del alumno o profesor',onInput:e=>{APP.incAlumno=e.target.value}})));
    form.append(h('div',{style:{display:'flex',gap:'12px',marginTop:'8px'}},
      h('button',{className:'btn-warn',style:{flex:1,padding:'16px',fontSize:'15px'},onClick:addIncidencia},'⚠️ Registrar'),
      h('button',{className:'btn-secondary',style:{flex:1},onClick:()=>{APP.showAddInc=false;render()}},'Cancelar')
    ));
    main.append(form);
  }
  // Summary
  const open=APP.incidencias.filter(i=>!i.resuelta).length,closed=APP.incidencias.filter(i=>i.resuelta).length;
  main.append(h('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'12px',marginBottom:'20px'}},
    h('div',{style:{background:'rgba(245,158,11,.08)',borderRadius:'14px',padding:'14px',textAlign:'center',border:'1px solid rgba(245,158,11,.2)'}},
      h('p',{style:{fontSize:'26px',fontWeight:900,color:'var(--warn)',fontFamily:'var(--mono)',margin:0}},String(open)),h('p',{style:{fontSize:'10px',fontWeight:700,color:'var(--muted)',margin:'6px 0 0',textTransform:'uppercase'}},'Abiertas')),
    h('div',{style:{background:'rgba(78,205,196,.08)',borderRadius:'14px',padding:'14px',textAlign:'center',border:'1px solid rgba(78,205,196,.2)'}},
      h('p',{style:{fontSize:'26px',fontWeight:900,color:'var(--ok)',fontFamily:'var(--mono)',margin:0}},String(closed)),h('p',{style:{fontSize:'10px',fontWeight:700,color:'var(--muted)',margin:'6px 0 0',textTransform:'uppercase'}},'Resueltas')),
    h('div',{style:{background:'rgba(94,198,184,.08)',borderRadius:'14px',padding:'14px',textAlign:'center',border:'1px solid rgba(94,198,184,.2)'}},
      h('p',{style:{fontSize:'26px',fontWeight:900,color:'var(--teal)',fontFamily:'var(--mono)',margin:0}},String(APP.incidencias.length)),h('p',{style:{fontSize:'10px',fontWeight:700,color:'var(--muted)',margin:'6px 0 0',textTransform:'uppercase'}},'Total'))
  ));
  // List
  if(APP.incidencias.length===0){main.append(h('div',{className:'empty'},h('div',{className:'emoji'},'✅'),h('p',null,'No hay incidencias registradas')));return main}
  APP.incidencias.forEach(inc=>{
    const ti=inc.tipo==='dañada'?{e:'🔨',l:'Dañada',c:'var(--danger)'}:inc.tipo==='incompleta'?{e:'📦',l:'Incompleta',c:'var(--warn)'}:{e:'⏳',l:'Desgastada',c:'#64b5f6'};
    main.append(h('div',{className:'card',style:{borderColor:inc.resuelta?'rgba(78,205,196,.2)':undefined,opacity:inc.resuelta?'.7':'1'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:'10px'}},
        h('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
          h('div',{style:{width:'42px',height:'42px',borderRadius:'12px',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'18px',
            background:inc.resuelta?'rgba(78,205,196,.12)':'rgba(224,85,101,.08)',flexShrink:0}},inc.resuelta?'✅':ti.e),
          h('div',null,h('p',{style:{fontWeight:700,fontSize:'14px',margin:0}},inc.productoNombre),
            h('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginTop:'3px'}},
              h('span',{style:{color:'var(--teal)',fontSize:'11px',fontFamily:'var(--mono)',fontWeight:700}},inc.productoId),
              h('span',{style:{fontSize:'10px',fontWeight:700,color:inc.resuelta?'var(--ok)':ti.c,background:inc.resuelta?'rgba(78,205,196,.12)':'rgba(224,85,101,.08)',padding:'2px 10px',borderRadius:'20px'}},inc.resuelta?'Resuelta':ti.l)))),
        h('span',{style:{color:'var(--dim)',fontSize:'10px',fontFamily:'var(--mono)',fontWeight:600}},inc.id)),
      h('div',{style:{background:'var(--bg)',borderRadius:'12px',padding:'12px',marginBottom:'10px'}},
        h('p',{style:{fontSize:'13px',lineHeight:'1.6',margin:0}},inc.descripcion)),
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center'}},
        h('div',null,
          inc.alumno?h('p',{style:{color:'var(--muted)',fontSize:'12px',margin:'0 0 2px'}},'👤 '+inc.alumno):null,
          h('p',{style:{color:'var(--dim)',fontSize:'11px',margin:0}},'📅 '+inc.fecha),
          inc.resuelta?h('p',{style:{color:'var(--ok)',fontSize:'11px',fontWeight:600,margin:'2px 0 0'}},'✅ '+inc.fechaResolucion):null),
        !inc.resuelta&&can('incident')?h('button',{className:'btn-ok',onClick:()=>resolverInc(inc.id)},'Resolver'):null)
    ));
  });
  return main;
}

  const main=h('div',{className:'fade-in'},

      h('button',{className:'btn-primary',style:{width:'auto',padding:'12px 22px',fontSize:'14px'},
        onClick:()=>{APP.editUser=null;APP.newUser={usuario:'',password:'',rol:'operario',nombre:''};APP.modal='user';render()}},'+ Nuevo Usuario')
    )
  );
  APP.usuarios.forEach((u,i)=>{
    main.append(h('div',{className:'user-row'},
      h('div',{className:'avatar',style:{background:colors[i%colors.length]}},u.nombre.charAt(0).toUpperCase()),
      h('div',{style:{flex:1}},

  const main=h('div',{className:'fade-in'},

    h('div',{className:'config-section'},
      h('h3',null,'🔗 Google Sheets'),
      h('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'16px'}},
        h('div',{style:{width:'12px',height:'12px',borderRadius:'50%',background:APP.connected?'var(--ok)':'var(--warn)'}}),
        h('span',{style:{fontSize:'14px',fontWeight:700,color:APP.connected?'var(--ok)':'var(--warn)'}},APP.connected?'✅ Conectado':'⏳ Pendiente')),
      h('div',{className:'field'},h('label',null,'URL (integrada en el código)'),
        h('input',{value:APP.sheetsUrl,readOnly:true,style:{background:'#0d1b2a',color:'var(--teal)',fontSize:'10px',fontFamily:'var(--mono)'}})),
      h('div',{style:{display:'flex',gap:'12px'}},
        h('button',{className:'btn-primary',style:{fontSize:'14px'},onClick:syncFromSheets},'🔄 Sincronizar Ahora'),
        h('button',{className:'btn-secondary',onClick:()=>{localStorage.removeItem('santurtzi_state');load();syncFromSheets()}},'🔄 Forzar Resincronización'))
    ),
    h('div',{className:'config-section'},
      h('h3',null,'🗃️ Datos'),
      h('div',{style:{display:'flex',gap:'12px'}},
        h('button',{className:'btn-secondary',onClick:()=>{
          const d=JSON.stringify({productos:APP.productos,historial:APP.historial,incidencias:APP.incidencias,usuarios:APP.usuarios},null,2);
          const blob=new Blob([d],{type:'application/json'});const url=URL.createObjectURL(blob);
          const a=document.createElement('a');a.href=url;a.download='inventario_backup.json';a.click();URL.revokeObjectURL(url);
          notify('Backup descargado')}},'📥 Exportar Backup'),
        h('button',{className:'btn-danger',onClick:()=>{if(confirm('¿Borrar datos locales y resincronizar desde Google Sheets?')){
          localStorage.removeItem('santurtzi_state');load();syncFromSheets()}}},'🗑️ Reiniciar y Resincronizar'))
    ),
    h('div',{className:'config-section'},
      h('h3',null,'🖨️ Códigos QR'),
      h('p',{style:{color:'var(--muted)',fontSize:'13px',marginBottom:'16px'}},'Genera todos los QR para imprimir y pegar en las herramientas.'),
      h('button',{className:'btn-primary',style:{fontSize:'14px'},onClick:printAllQR},'🖨️ Generar QRs para Imprimir'))
  );
  return main;
}

function printAllQR(){
  const items=APP.productos.map(p=>{
    const cv=document.createElement('canvas');drawQR(cv,p.id,150);
    return {nombre:p.nombre,id:p.id,ubicacion:p.ubicacion,img:cv.toDataURL()};
  });
  const html='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>QR - Santurtzi LHFP</title>'+
    '<style>body{font-family:Arial,sans-serif;padding:20px;background:#fff;color:#000}h2{text-align:center}'+
    '.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.item{text-align:center;border:2px solid #ccc;border-radius:10px;padding:12px;page-break-inside:avoid}'+
    '.item img{display:block;margin:0 auto 6px}.item h4{margin:4px 0;font-size:11px}.item p{margin:2px 0;font-size:10px;color:#444}.code{font-weight:bold;font-size:12px;color:#000}'+
    '.no-print{text-align:center;margin:20px 0}@media print{.no-print{display:none}}@media(max-width:600px){.grid{grid-template-columns:repeat(2,1fr)}}</style></head><body>'+
    '<h2>Santurtzi LHFP - Códigos QR</h2><div class="no-print"><button onclick="window.print()" style="padding:12px 32px;font-size:16px;background:#3b8d8d;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:bold">🖨️ Imprimir</button></div><div class="grid">'+
    items.map(p=>'<div class="item"><img src="'+p.img+'" width="120" height="120"><h4>'+p.nombre+'</h4><p class="code">'+p.id+'</p><p>📍 '+p.ubicacion+'</p></div>').join('')+
    '</div></body></html>';
  const blob=new Blob([html],{type:'text/html'});const url=URL.createObjectURL(blob);
  const win=window.open(url,'_blank');
  if(!win){const a=document.createElement('a');a.href=url;a.download='qr-inventario.html';a.click();notify('Archivo QR descargado');}
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}

    h('div',{className:'modal',style:{maxWidth:'440px'}},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px'}},

      h('div',{id:'qr-reader',style:{marginBottom:'16px',borderRadius:'16px',overflow:'hidden'}}),
      h('div',{style:{background:'var(--bg)',borderRadius:'14px',padding:'16px',border:'1px solid var(--border)'}},
        h('label',{style:{color:'var(--muted)',fontSize:'11px',fontWeight:700,display:'block',marginBottom:'8px',textTransform:'uppercase',letterSpacing:'1px'}},'Código manual'),
        h('div',{style:{display:'flex',gap:'10px'}},
          h('input',{style:{flex:1,background:'var(--card)',border:'1px solid var(--border)',borderRadius:'12px',padding:'12px 14px',color:'var(--text)',fontSize:'15px',fontFamily:'var(--mono)'},

// ── INIT ──
load();
render();
